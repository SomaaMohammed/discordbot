name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tsbot/package-lock.json

      - name: Install dependencies
        run: |
          cd tsbot
          npm ci

      - name: Validate JSON files
        run: |
          node -e "JSON.parse(require('node:fs').readFileSync('questions.json','utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('answers.json','utf8'))"
          node -e "JSON.parse(require('node:fs').readFileSync('state.json','utf8'))"

      - name: Typecheck
        run: |
          cd tsbot
          npm run typecheck

      - name: Tests
        run: |
          cd tsbot
          npm test

      - name: Build
        run: |
          cd tsbot
          npm run build
