name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate JSON files
        run: |
          python -m json.tool questions.json > /dev/null
          python -m json.tool answers.json > /dev/null
          python -m json.tool state.json > /dev/null

      - name: Compile check
        run: python -m py_compile bot.py

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy bot.py courtbot

      - name: Run tests
        run: python -m pytest -q --cov=bot --cov=courtbot --cov-report=term-missing
